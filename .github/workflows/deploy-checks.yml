name: Checks (HR)

# Typecheck + full test suite (including RLS/integration tests) against a
# throwaway pgvector Postgres. Runs on PRs and pushes to main. Vercel handles
# the actual deploy via its Git integration once these pass.

on:
  pull_request:
  push:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: hr
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/hr
      # Deterministic test key (NOT a production secret). Must decode to exactly 32 bytes.
      PII_ENCRYPTION_KEY: dGVzdC1rZXktMzItYnl0ZXMtZm9yLWNpLW9ubHktMDA=
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.10.0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Migrate + seed test DB
        run: |
          pnpm --filter @hr/db migrate
          pnpm --filter @hr/db seed
      - name: Typecheck
        run: pnpm typecheck
      - name: Test
        run: pnpm test
